<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="starFill" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#fff9e6" />
      <stop offset="48%" stop-color="#ffe066" />
      <stop offset="100%" stop-color="#ffb830" />
    </radialGradient>
    <radialGradient id="starBelly" cx="50%" cy="72%" r="42%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,220,100,0.35)" />
      <stop offset="100%" stop-color="rgba(255,220,100,0)" />
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- soft halo for dock / taskbar visibility -->
  <circle cx="512" cy="520" r="420" fill="url(#bgGlow)" />

  <g transform="translate(512 520) scale(7.2) translate(-60 -64)" filter="url(#softGlow)">
    <path
      d="M53.5 34.4 Q60 18 66.5 34.4 L71.8 47.8 L86.2 48.7 Q103.7 49.8 90.1 61 L79 70.2 L82.6 84.1 Q87 101.2 72.2 91.7 L60 84 L47.8 91.7 Q33 101.2 37.4 84.1 L41 70.2 L29.9 61 Q16.3 49.8 33.8 48.7 L48.2 47.8 Z"
      fill="url(#starFill)"
      stroke="rgba(255,255,255,0.75)"
      stroke-width="2.8"
      stroke-linejoin="round"
      stroke-linecap="round"
    />
    <ellipse cx="60" cy="66" rx="18" ry="16" fill="url(#starBelly)" />
  </g>

  <g transform="translate(512 520) scale(7.2) translate(-60 -64)">
    <ellipse cx="48" cy="54" rx="6.5" ry="7.5" fill="#3d2858" />
    <ellipse cx="72" cy="54" rx="6.5" ry="7.5" fill="#3d2858" />
    <circle cx="50" cy="51.5" r="2" fill="#ffffff" />
    <circle cx="74" cy="51.5" r="2" fill="#ffffff" />
    <ellipse cx="38" cy="64" rx="7.5" ry="5" fill="#ff9ec4" opacity="0.85" />
    <ellipse cx="82" cy="64" rx="7.5" ry="5" fill="#ff9ec4" opacity="0.85" />
    <path
      d="M49 68 Q60 77 71 68"
      fill="none"
      stroke="#3d2858"
      stroke-width="2.6"
      stroke-linecap="round"
    />
  </g>

  <circle cx="470" cy="250" r="14" fill="#ffffff" opacity="0.9" />
  <circle cx="760" cy="380" r="10" fill="#ffffff" opacity="0.75" />
  <circle cx="290" cy="400" r="8" fill="#ffffff" opacity="0.65" />
</svg>
