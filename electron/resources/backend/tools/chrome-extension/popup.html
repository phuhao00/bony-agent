<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    h2 {
      margin: 0 0 16px 0;
      color: #333;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .platform {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      margin: 8px 0;
      background: #f8f9fa;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .platform:hover {
      background: #e9ecef;
    }
    .platform-name {
      font-weight: 500;
      color: #333;
    }
    .platform-status {
      font-size: 12px;
      color: #6c757d;
    }
    .save-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .save-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .save-btn.success {
      background: #28a745;
    }
    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .message.show {
      display: block;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
    }
    .message.error {
      background: #f8d7da;
      color: #721c24;
    }
    .instructions {
      margin-top: 16px;
      padding: 12px;
      background: #fff3cd;
      border-radius: 8px;
      font-size: 12px;
      color: #856404;
    }
    .instructions ol {
      margin: 8px 0 0 0;
      padding-left: 18px;
    }
    .instructions li {
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔐 Cookie 保存器</h2>
    
    <div id="currentPlatform" class="platform">
      <div>
        <div class="platform-name" id="platformName">检测中...</div>
        <div class="platform-status" id="platformStatus">正在检测当前页面</div>
      </div>
      <button class="save-btn" id="saveBtn" disabled>保存</button>
    </div>
    
    <div id="message" class="message"></div>
    
    <div class="instructions">
      <strong>📋 使用说明：</strong>
      <ol>
        <li>在目标平台完成登录</li>
        <li>点击此扩展图标</li>
        <li>点击"保存"按钮</li>
        <li>Cookie 将下载为 JSON 文件</li>
      </ol>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
