<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
    <title>AI Media Agent</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --border: #2a2a45;
            --accent: #6c63ff;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --gray: #6b7280;
            --text: #e2e8f0;
            --subtext: #94a3b8;
            --radius: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-app-region: no-drag;
        }

        /* ── Title bar area ── */
        .titlebar {
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-app-region: drag;
            flex-shrink: 0;
            position: relative;
        }

        .titlebar h1 {
            font-size: 13px;
            font-weight: 600;
            color: var(--subtext);
            letter-spacing: 0.02em;
        }

        /* ── Overall status badge ── */
        .overall-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 16px 12px;
            padding: 8px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--gray);
            flex-shrink: 0;
        }

        .pulse-dot.running {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .pulse-dot.starting {
            background: var(--yellow);
            animation: pulse 1.2s infinite;
        }

        .pulse-dot.error {
            background: var(--red);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .overall-label {
            font-weight: 600;
        }

        .open-dashboard-btn {
            margin-left: auto;
            padding: 4px 10px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity .15s;
        }

        .open-dashboard-btn:hover {
            opacity: 0.85;
        }

        .open-dashboard-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        /* ── Service list ── */
        .services {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .service-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            flex-direction: column;
        }

        .svc-main-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .svc-error {
            font-size: 10px;
            color: var(--red);
            opacity: 0.8;
            word-break: break-all;
            padding-left: 18px;
            line-height: 1.4;
            margin-top: -2px;
        }

        .svc-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--gray);
        }

        .svc-dot.running {
            background: var(--green);
        }

        .svc-dot.starting {
            background: var(--yellow);
            animation: pulse 1.2s infinite;
        }

        .svc-dot.error {
            background: var(--red);
        }

        .svc-dot.unavailable {
            background: var(--gray);
        }

        .svc-name {
            flex: 1;
            font-weight: 500;
        }

        .svc-port {
            color: var(--subtext);
            font-size: 11px;
            font-variant-numeric: tabular-nums;
        }

        .svc-status {
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 4px;
            font-weight: 500;
            text-transform: capitalize;
            background: rgba(255, 255, 255, 0.06);
        }

        .svc-status.running {
            background: rgba(34, 197, 94, .15);
            color: var(--green);
        }

        .svc-status.starting {
            background: rgba(234, 179, 8, .12);
            color: var(--yellow);
        }

        .svc-status.error {
            background: rgba(239, 68, 68, .12);
            color: var(--red);
        }

        .svc-status.unavailable {
            color: var(--gray);
        }

        /* ── Footer actions ── */
        .footer {
            display: flex;
            gap: 8px;
            padding: 12px 16px 14px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            padding: 7px 0;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background .15s;
        }

        .btn:hover {
            background: #252540;
        }

        .btn.danger {
            border-color: rgba(239, 68, 68, .4);
            color: var(--red);
        }

        .btn.danger:hover {
            background: rgba(239, 68, 68, .08);
        }

        .btn-icon {
            margin-right: 4px;
        }

        /* ── Gatekeeper notice ── */
        .notice {
            margin: 0 16px 10px;
            padding: 7px 10px;
            background: rgba(108, 99, 255, .08);
            border: 1px solid rgba(108, 99, 255, .25);
            border-radius: var(--radius);
            font-size: 11px;
            color: var(--subtext);
            display: none;
        }

        .notice a {
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <h1>AI Media Agent</h1>
    </div>

    <div class="overall-status">
        <div class="pulse-dot" id="overall-dot"></div>
        <span class="overall-label" id="overall-label">Checking services…</span>
        <button class="open-dashboard-btn" id="btn-dashboard" disabled>Open
            Dashboard</button>
    </div>

    <div class="notice" id="gk-notice">
        ⚠️ First launch? macOS may block unsigned apps.
        <a onclick="showGKHelp()">How to allow it →</a>
    </div>

    <div class="services" id="services-list">
        <!-- Populated by JS -->
    </div>

    <div class="footer">
        <button class="btn" id="btn-restart">
            <span class="btn-icon">&#x27F3;</span>Restart
        </button>
        <button class="btn" id="btn-config">
            <span class="btn-icon">&#x2699;&#xFE0F;</span>Config
        </button>
        <button class="btn" id="btn-logs">
            <span class="btn-icon">&#x1F4CB;</span>Logs
        </button>
        <button class="btn danger" id="btn-stop">
            <span class="btn-icon">&#x23F9;</span>Stop
        </button>
    </div>

    <script src="status.js"></script>
</body>
</html>
