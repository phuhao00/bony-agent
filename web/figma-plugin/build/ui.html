        font-size: 11px;
        font-weight: 600;

        height: 6px;

        color: #166534;

        background: #22c55e;
      }

        color: #991b1b;
      }

        background: #ef4444;
      }

        font-weight: 600;
        margin-bottom: 6px;
      }

        color: #666;
      }
      .status-success {
        color: #166534;
      }
      .status-error {
        color: #991b1b;
      }
      .error {
        display: none;
        margin-bottom: 8px;
        padding: 8px;
        background: #fee2e2;
        border-radius: 6px;
        color: #991b1b;
        font-size: 11px;
        word-break: break-word;
        white-space: pre-wrap;
      }
      .hint {
        color: #666;
        margin-bottom: 8px;
        font-size: 11px;
      }
      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }
      button {
        border: none;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        background: #f3f4f6;
        color: #374151;
      }
      button:hover {
        background: #e5e7eb;
      }
      .url {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
        color: #6b7280;
        word-break: break-all;
        margin-bottom: 8px;
      }
      .log {
        padding: 8px;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
        color: #4b5563;
        height: 160px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
        user-select: text;
        -webkit-user-select: text;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="title">AI Media Agent Bridge</div>
      <div id="badge" class="badge disconnected">未连接</div>
    </div>
    <div id="status" class="status status-info">初始化…</div>
    <div id="error" class="error"></div>
    <div class="hint">保持窗口打开。如果 10 秒内未连接，点「复制日志」；复制失败就手动选中下方日志文本复制。</div>
    <div class="actions">
      <button id="reconnect" type="button" style="display: none;">重新连接</button>
      <button id="copyLog" type="button">复制日志</button>
    </div>
    <div class="url">127.0.0.1 / localhost :36855 / :8000</div>
    <div id="log" class="log"></div>
