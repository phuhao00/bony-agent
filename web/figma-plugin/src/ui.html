<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 12px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 12px;
        color: #333;
        line-height: 1.4;
        width: 320px;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .title {
        font-weight: 600;
        font-size: 13px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
      }
      .badge::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      .badge.connected {
        background: #dcfce7;
        color: #166534;
      }
      .badge.connected::before {
        background: #22c55e;
      }
      .badge.disconnected {
        background: #fee2e2;
        color: #991b1b;
      }
      .badge.disconnected::before {
        background: #ef4444;
      }
      .status {
        font-weight: 600;
        margin-bottom: 6px;
      }
      .status-info {
        color: #666;
      }
      .status-success {
        color: #166534;
      }
      .status-error {
        color: #991b1b;
      }
      .error {
        display: none;
        margin-bottom: 8px;
        padding: 8px;
        background: #fee2e2;
        border-radius: 6px;
        color: #991b1b;
        font-size: 11px;
        word-break: break-word;
        white-space: pre-wrap;
      }
      .hint {
        color: #666;
        margin-bottom: 8px;
        font-size: 11px;
      }
      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }
      button {
        border: none;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        background: #f3f4f6;
        color: #374151;
      }
      button:hover {
        background: #e5e7eb;
      }
      .url {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
        color: #6b7280;
        word-break: break-all;
        margin-bottom: 8px;
      }
      .log {
        padding: 8px;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
        color: #4b5563;
        height: 160px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
        user-select: text;
        -webkit-user-select: text;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="title">AI Media Agent Bridge</div>
      <div id="badge" class="badge disconnected">未连接</div>
    </div>
    <div id="status" class="status status-info">初始化…</div>
    <div id="error" class="error"></div>
    <div class="hint">保持窗口打开。如果 10 秒内未连接，点「复制日志」；复制失败就手动选中下方日志文本复制。</div>
    <div class="actions">
      <button id="reconnect" type="button" style="display: none;">重新连接</button>
      <button id="copyLog" type="button">复制日志</button>
    </div>
    <div class="url">127.0.0.1 / localhost :36855 / :8000</div>
    <div id="log" class="log"></div>
    <script src="ui.js"></script>
  </body>
</html>
